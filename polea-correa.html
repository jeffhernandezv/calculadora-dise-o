<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diseño de Poleas - Correa</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="contenedor-principal">
        <h1 class="titulo-principal">Diseño de Poleas - Correa</h1>

<div class="imagen-polea-correa">
    <img 
        src="img/polea-correa.jpg" 
        alt="Esquema de transmisión por polea y correa"
    >
</div>
                <div class="grid-diseno">
            
            <div class="panel">
                <p class="mini-titulo">1. Conversores Auxiliares</p>
                
                <div class="sub-seccion">
                    <label>Conversión de kW a HP</label>
                    <div class="fila-input">
                        <input type="number" id="kwInput" placeholder="Ingresa kW">
                    </div>
                    <button onclick="convKWaHP()" class="btn-gris-ancho">Convertir a HP</button>
                    <input type="text" id="resHP" class="res-input-amarillo" readonly placeholder="Resultado en HP">
                </div>

                <div class="sub-seccion">
                    <label>RPM a Velocidad Angular (ω)</label>
                    <div class="fila-input">
                        <input type="number" id="rpmParaRad" placeholder="Ingresa RPM">
                    </div>
                    <button onclick="convRPMaRad()" class="btn-gris-ancho">Convertir a Rad/s</button>
                    <input type="text" id="resRad" class="res-input-amarillo" readonly placeholder="Resultado en rad/s">
                </div>

                <div class="sub-seccion">
                    <label>Potencia mediante Torque (N·m)</label>
                    <input type="number" id="torqueNM" placeholder="Torque en N·m" style="margin-bottom: 5px;">
                    <input type="number" id="rpmTorque" placeholder="RPM del motor" style="margin-bottom: 5px;">
                    <button onclick="calcPotTorque()" class="btn-gris-ancho">Convertir a HP</button>
                    <input type="text" id="resTorqueHP" class="res-input-amarillo" readonly placeholder="Resultado en HP">
                </div>
            </div>

            <div class="panel">
                <p class="mini-titulo">2. Determinar Factor de Servicio</p>

                <label>Tipo de Máquina (Equipo Impulsado)</label>
                <select id="tipoMaquina" onchange="actualizarFS()">
                    <option value="" selected disabled>Seleccione tipo de máquina</option>
                    <optgroup label="Carga Ligera (Base 1.0)">
                        <option value="1.0">Agitadores para Líquidos</option>
                        <option value="1.0">Sopladores y Aspiradoras</option>
                        <option value="1.0">Bombas Centrífugas y Compresoras</option>
                        <option value="1.0">Ventiladores hasta 10 HP</option>
                        <option value="1.0">Transportadores de Trabajo Ligero</option>
                    </optgroup>

                    <optgroup label="Carga Moderada (Base 1.1)">
                        <option value="1.1">Transportadores de Banda (Arena/Grano)</option>
                        <option value="1.1">Amasadora</option>
                        <option value="1.1">Ventiladores de más de 10 HP</option>
                        <option value="1.1">Generadores / Ejes de Línea</option>
                        <option value="1.1">Maquinaria de Lavandería / Imprenta</option>
                        <option value="1.1">Máquinas-Herramientas / Prensas</option>
                        <option value="1.1">Bombas Rotatorias DP</option>
                        <option value="1.1">Cribas Giratorias y Vibratorias</option>
                    </optgroup>

                    <optgroup label="Carga Pesada (Base 1.2)">
                        <option value="1.2">Maquinaria para Ladrillos</option>
                        <option value="1.2">Elevadores de Cangilones</option>
                        <option value="1.2">Excitadores / Pulverizadores</option>
                        <option value="1.2">Compresores de Pistones</option>
                        <option value="1.2">Molinos de Martillos</option>
                        <option value="1.2">Hidropulper / Maquinaria Textil</option>
                        <option value="1.2">Maquinaria para Molinos de Sierra</option>
                    </optgroup>

                    <optgroup label="Carga Muy Pesada (Base 1.3)">
                        <option value="1.3">Quebradoras (Giratorias-Mordaza)</option>
                        <option value="1.3">Molinos (Bolas-Barras-Rodillos)</option>
                        <option value="1.3">Malacates</option>
                        <option value="1.3">Calandria / Extrusoras</option>
                    </optgroup>

                    <option value="2.0">Equipo con Ahogador</option>
                </select>

                <label>Horas de Servicio Diario</label>
                <select id="tipoServicio" onchange="actualizarFS()">
                    <option value="" selected disabled>Seleccione horas de servicio</option>
                    <option value="0">Intermitente (Menos de 6h)</option>
                    <option value="0.1">Normal (6 a 16h)</option>
                    <option value="0.2">Continuo (16 a 24h)</option>
                </select>

                <div class="valor-fs-caja">
                    FS Sugerido por Tabla: <span id="fsSugerido">-</span>
                </div>
            </div>

            <div class="panel">
                <p class="mini-titulo">3. Cálculo Potencia de Diseño</p>
                
                <label>Potencia Calculada (HP)</label>
                <input type="number" id="potenciaPrincipal" placeholder="Valor manual" oninput="calcularPasosParciales()">

                <div class="fila-check">
                    <input type="checkbox" id="usarND" onchange="toggleND()">
                    <label for="usarND">¿Solicita Factor de Diseño (Nd)?</label>
                </div>

                <input type="number" id="valorND" placeholder="Ej: 1.3" disabled oninput="calcularPasosParciales()">
                
                <label>P * Nd -> Motor Comercial</label>
                <input type="text" id="resPotND" class="res-input-amarillo" readonly placeholder="Resultado Comercial">

                <label>Factor de Servicio Final (F.S)</label>
                <input type="number" id="fsManual" step="0.1" class="input-foco-verde" oninput="calcularPasosParciales()">
                
                <label>Potencia de Diseño Final (Pd)</label>
                <input type="text" id="resPotFS" class="res-input-amarillo" readonly placeholder="Motor * F.S">

                <label>RPM Motor (Entrada)</label>
                <input type="number" id="rpmEntrada" placeholder="Ej: 1750" oninput="calcularPasosParciales()">

                <label>RPM Salida</label>
                <input type="number" id="rpmSalida" placeholder="Ej: 350" oninput="calcularPasosParciales()">

                <label>Tecnología de Banda</label>
                <select id="tecnologiaBanda" class="select-tecnologia" onchange="calcularPasosParciales()">
                    <option value="" selected disabled>Seleccione tecnología de banda</option>
                    <option value="convencional">Convencional Estándar (A, B, C, D)</option>
                    <option value="convencionalX">Convencional Dentada / X (AX, BX, CX)</option>
                    <option value="altaCapacidad">Alta Capacidad Estándar (3V, 5V, 8V)</option>
                    <option value="altaCapacidadX">Alta Capacidad Dentada / X (3VX, 5VX)</option>
                </select>

                <label>Tipo de Ranura de Polea</label>
                <select id="tipoRanuraPolea" class="select-tecnologia" onchange="calcularPasosParciales()">
                    <option value="" selected disabled>Seleccione tipo de ranura</option>
                    <option value="estandar">Polea Estándar</option>
                    <option value="profunda">Polea con Ranura Profunda</option>
                </select>

                <button onclick="calcularDiseno()" class="btn-azul">Finalizar Diseño</button>
            </div>
        </div>
        
        <div id="resultado" class="resultado"></div>
    </div>

    <script src="JS/polea-correa.js"></script>
</body>
</html>
